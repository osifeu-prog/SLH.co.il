<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎨 גלריה · SLH Marketplace · כל הNFTs המאושרים</title>
<meta name="description" content="כל הNFTs והשיעורים שאושרו ב-SLH Spark Marketplace. תמונה, סיפור, מחיר — הכל שקוף וניתן לקנייה ישירה.">
<link rel="canonical" href="https://slh-nft.com/gallery.html">
<meta property="og:title" content="🎨 SLH Gallery — NFTs & Courses">
<meta property="og:description" content="אומנות דיגיטלית + שיעורים ממומחים ישראלים. כל פריט סיפור.">
<meta property="og:url" content="https://slh-nft.com/gallery.html">
<link rel="icon" type="image/png" href="/favicon-32.png">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/slh-design-system.css">
<meta name="slh-version" content="v1.0-flip">
<script defer src="/js/slh-flip.js?v=20260426e"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rubik',system-ui,sans-serif;background:#05080f;color:#f5f5f8;min-height:100vh;padding:20px}
a{color:#00e5ff;text-decoration:none}
a:hover{text-decoration:underline}

.wrap{max-width:1200px;margin:0 auto;padding:20px 16px 60px}
.hdr{text-align:center;margin-bottom:30px}
.hdr h1{font-size:clamp(28px,4vw,44px);font-weight:900;background:linear-gradient(135deg,#a855f7,#ec4899,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0 0 10px}
.hdr p{color:#9ba0b5;margin:0}

.controls{display:flex;gap:10px;margin:20px 0;flex-wrap:wrap;align-items:center}
.controls select, .controls input{padding:10px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:8px;font-family:inherit;font-size:13px}
.controls .btn{padding:10px 20px;background:linear-gradient(135deg,#00ff41,#00e5ff);color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer}
.controls .btn-sec{background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.12)}

.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;text-align:center}
.stat .v{font-size:22px;font-weight:900;color:#00e5ff;font-family:'JetBrains Mono',monospace}
.stat .l{font-size:10px;color:#9ba0b5;text-transform:uppercase;letter-spacing:1px;margin-top:4px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;margin-top:20px}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden;transition:.2s;cursor:pointer}
.card:hover{transform:translateY(-4px);border-color:#00e5ff;box-shadow:0 12px 32px rgba(0,229,255,.2)}
.card .img{width:100%;aspect-ratio:1;background:#0d1220;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#5a6078;font-size:40px}
.card .img img{width:100%;height:100%;object-fit:cover}
.card .body{padding:14px}
.card h3{font-size:15px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .story{font-size:12px;color:#9ba0b5;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.card .meta{display:flex;justify-content:space-between;align-items:center;gap:8px}
.card .price{font-size:18px;font-weight:800;color:#ffd700;font-family:'JetBrains Mono',monospace}
.card .cat{font-size:10px;padding:3px 8px;background:rgba(168,85,247,.15);color:#a855f7;border:1px solid rgba(168,85,247,.3);border-radius:4px;text-transform:uppercase}
.card.course .cat{background:rgba(0,229,255,.15);color:#00e5ff;border-color:rgba(0,229,255,.3)}
.card .seller{font-size:11px;color:#5a6078;margin-top:6px;display:flex;align-items:center;gap:4px}

.empty{text-align:center;padding:80px 20px;color:#5a6078}
.empty h2{font-size:24px;color:#9ba0b5;margin-bottom:10px}
.empty a{color:#00ff41;font-weight:700}

.load-more{display:block;margin:30px auto;padding:14px 40px;background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:50px;cursor:pointer;font-family:inherit;font-weight:700}
.load-more:hover{border-color:#00e5ff;color:#00e5ff}

/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.modal.on{display:flex}
.modal-body{background:#0d1220;border:1px solid rgba(255,255,255,.1);border-radius:16px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal .close{position:absolute;top:14px;inset-inline-end:14px;background:rgba(255,255,255,.1);color:#fff;border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px}
.modal img{width:100%;max-height:400px;object-fit:contain;background:#05080f;display:block}
.modal-content{padding:24px}
.modal h2{font-size:24px;color:#fff;margin-bottom:10px}
.modal .full-story{color:#cdd1e0;line-height:1.7;margin-bottom:16px;white-space:pre-wrap}
.modal .buy-btn{display:block;width:100%;padding:16px;background:linear-gradient(135deg,#00ff41,#00e5ff);color:#000;border:none;border-radius:12px;font-size:16px;font-weight:900;cursor:pointer}

.foot{text-align:center;margin-top:40px;color:#5a6078;font-size:12px;padding-top:20px;border-top:1px solid rgba(255,255,255,.06)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1 data-scramble="SLH Gallery">SLH Gallery</h1>
    <p>NFTs · שיעורים · סיפורים · אומנות דיגיטלית של יוצרי SLH</p>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="v" id="s-items">—</div><div class="l">פריטים</div></div>
    <div class="stat"><div class="v" id="s-creators">—</div><div class="l">יוצרים</div></div>
    <div class="stat"><div class="v" id="s-sales">—</div><div class="l">מכירות</div></div>
    <div class="stat"><div class="v" id="s-vol">—</div><div class="l">נפח כולל</div></div>
  </div>

  <div class="controls">
    <select id="f-category" onchange="applyFilters()">
      <option value="">כל הקטגוריות</option>
      <option value="nft">🎨 NFT</option>
      <option value="course">🎓 Course</option>
      <option value="digital">💾 Digital</option>
      <option value="physical">📦 Physical</option>
      <option value="service">🛠 Service</option>
    </select>
    <select id="f-sort" onchange="applyFilters()">
      <option value="new">חדש ביותר</option>
      <option value="price-low">מחיר: נמוך → גבוה</option>
      <option value="price-high">מחיר: גבוה → נמוך</option>
      <option value="popular">פופולרי (views)</option>
    </select>
    <input id="f-search" type="search" placeholder="🔍 חיפוש..." oninput="applyFilters()" style="flex:1;min-width:200px">
    <button class="btn" onclick="location.href='/sell.html'">🎨 מכור שלי</button>
  </div>

  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display:none">
    <h2>עדיין אין פריטים</h2>
    <p>היה הראשון — <a href="/sell.html">העלה את ה-NFT הראשון שלך</a></p>
  </div>

  <button class="load-more" id="load-more" onclick="loadMore()" style="display:none">טען עוד</button>

  <div class="foot">
    <p>🎨 כל פריט נבדק ומאושר ידנית · אוטו-פוסט ל-<a href="https://t.me/slhniffty">@slhniffty</a> בהתאמה</p>
    <p style="margin-top:10px">
      <a href="/sell.html">מכור</a> ·
      <a href="/shop.html">החנות שלי</a> ·
      <a href="/alpha-progress.html">Progress</a>
    </p>
  </div>
</div>

<div class="modal" id="modal" onclick="if(event.target.id==='modal')closeModal()">
  <div class="modal-body">
    <button class="close" onclick="closeModal()">×</button>
    <img id="m-img" src="" alt="">
    <div class="modal-content">
      <h2 id="m-title"></h2>
      <div class="meta" style="display:flex;gap:14px;align-items:center;margin:10px 0">
        <span id="m-cat" class="cat"></span>
        <span id="m-price" class="price"></span>
      </div>
      <div class="full-story" id="m-story"></div>
      <div class="seller" id="m-seller" style="color:#5a6078;font-size:12px;margin-bottom:16px"></div>
      <button class="buy-btn" id="m-buy" onclick="buyNow()">💳 קנה עכשיו</button>
    </div>
  </div>
</div>

<script>
const API = 'https://slh-api-production.up.railway.app';
let ALL_ITEMS = [];
let CURRENT_ITEM = null;
let OFFSET = 0;
const LIMIT = 24;

async function loadGallery(reset = true) {
  if (reset) {
    OFFSET = 0;
    ALL_ITEMS = [];
    document.getElementById('grid').innerHTML = '<div class="empty"><h2>טוען...</h2></div>';
  }
  try {
    const r = await fetch(`${API}/api/marketplace/items?limit=${LIMIT}&offset=${OFFSET}`);
    const data = await r.json();
    const items = data.items || [];
    ALL_ITEMS = reset ? items : [...ALL_ITEMS, ...items];
    OFFSET += items.length;
    render();
    document.getElementById('load-more').style.display = items.length === LIMIT ? 'block' : 'none';
  } catch (e) {
    document.getElementById('grid').innerHTML = `<div class="empty"><h2>שגיאה</h2><p>${e.message}</p></div>`;
  }
}

async function loadStats() {
  try {
    const r = await fetch(`${API}/api/marketplace/stats`);
    if (r.ok) {
      const d = await r.json();
      if (d.total_items !== undefined) document.getElementById('s-items').textContent = d.total_items;
      if (d.total_sellers !== undefined) document.getElementById('s-creators').textContent = d.total_sellers;
      if (d.total_orders !== undefined) document.getElementById('s-sales').textContent = d.total_orders;
      if (d.total_volume !== undefined) document.getElementById('s-vol').textContent = Math.round(d.total_volume) + '₪';
    }
  } catch (e) {}
}

function applyFilters() {
  render();
}

function render() {
  const cat = document.getElementById('f-category').value;
  const sort = document.getElementById('f-sort').value;
  const q = (document.getElementById('f-search').value || '').toLowerCase();

  let items = [...ALL_ITEMS];
  if (cat) items = items.filter(i => (i.category || '').toLowerCase() === cat);
  if (q) items = items.filter(i =>
    (i.title || '').toLowerCase().includes(q) ||
    (i.description || '').toLowerCase().includes(q)
  );

  if (sort === 'price-low') items.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
  else if (sort === 'price-high') items.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
  else if (sort === 'popular') items.sort((a, b) => (b.views || 0) - (a.views || 0));

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');

  if (items.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = items.map((item, idx) => {
    const isCourse = (item.category || '') === 'course';
    const img = item.image_url
      ? `<img src="${item.image_url}" alt="${escapeHtml(item.title)}" loading="lazy">`
      : (isCourse ? '🎓' : '🎨');
    const catLabel = { nft: '🎨 NFT', course: '🎓 Course', digital: '💾 Digital', physical: '📦 Physical', service: '🛠 Service' }[item.category] || item.category;
    return `<div class="card ${isCourse ? 'course' : ''}" onclick="openModal(${idx})">
      <div class="img">${img}</div>
      <div class="body">
        <h3>${escapeHtml(item.title)}</h3>
        <div class="story">${escapeHtml((item.description || '').slice(0, 120))}</div>
        <div class="meta">
          <span class="cat">${catLabel}</span>
          <span class="price">${parseFloat(item.price).toFixed(2)} ${item.currency}</span>
        </div>
        <div class="seller">👤 <span>${item.seller_id}</span></div>
      </div>
    </div>`;
  }).join('');
  // Save filtered items for modal lookup
  window._FILTERED = items;
}

function openModal(idx) {
  const item = window._FILTERED[idx];
  if (!item) return;
  CURRENT_ITEM = item;
  document.getElementById('m-img').src = item.image_url || '';
  document.getElementById('m-img').style.display = item.image_url ? 'block' : 'none';
  document.getElementById('m-title').textContent = item.title;
  document.getElementById('m-story').textContent = item.description || '';
  document.getElementById('m-cat').textContent = item.category;
  document.getElementById('m-price').textContent = `${parseFloat(item.price).toFixed(2)} ${item.currency}`;
  document.getElementById('m-seller').innerHTML = `👤 יוצר: <a href="/shop.html?user=${item.seller_id}">#${item.seller_id}</a> · 👁 ${item.views || 0} צפיות`;
  document.getElementById('modal').classList.add('on');
}

function closeModal() {
  document.getElementById('modal').classList.remove('on');
  CURRENT_ITEM = null;
}

function buyNow() {
  if (!CURRENT_ITEM) return;
  const buyerId = localStorage.getItem('slh_tg_id');
  if (!buyerId) {
    alert('אתה צריך להתחבר קודם. הולך ל-getting-started...');
    location.href = '/getting-started.html?next=gallery';
    return;
  }
  // Redirect to pay.html with prefilled product
  const params = new URLSearchParams({
    product_id: CURRENT_ITEM.id,
    title: CURRENT_ITEM.title,
    price: CURRENT_ITEM.price,
    currency: CURRENT_ITEM.currency,
    seller_id: CURRENT_ITEM.seller_id,
    buyer_id: buyerId,
  });
  location.href = `/pay.html?${params.toString()}`;
}

function loadMore() {
  loadGallery(false);
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// Init
loadGallery();
loadStats();
</script>
</body>
</html>
