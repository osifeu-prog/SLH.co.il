<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SLH IDO Round 2 — רשימת המתנה</title>
<link rel="icon" type="image/png" href="/favicon-32.png">
<style>
:root{--bg:#0a0a0a;--accent:#00ff41;--accent2:#39ff14;--bg2:#111;--text:#e0e0e0;--text2:#888;--border:rgba(255,255,255,.08);--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Arial Hebrew',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.hero{max-width:560px;width:100%;text-align:center}
.badge{display:inline-block;background:rgba(0,255,65,.1);color:var(--accent);border:1px solid rgba(0,255,65,.3);border-radius:20px;padding:6px 16px;font-size:13px;margin-bottom:20px}
h1{font-size:30px;color:#fff;margin-bottom:8px}
.sub{color:var(--text2);font-size:14px;margin-bottom:24px;line-height:1.6}
.stats{display:flex;gap:12px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;text-align:center;min-width:110px}
.stat-val{font-size:22px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--text2);margin-top:3px}
.form-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;text-align:right}
.form-box h2{font-size:18px;color:#fff;margin-bottom:20px;text-align:center}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px}
.field input,.field select{width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:#fff;font-size:14px;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:#1a1a1a}
.btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:background .2s}
.btn:hover{background:var(--accent2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{margin-top:16px;padding:12px;border-radius:8px;text-align:center;font-size:14px;display:none}
.msg.ok{background:rgba(0,255,65,.1);border:1px solid rgba(0,255,65,.3);color:var(--accent)}
.msg.err{background:rgba(255,0,85,.1);border:1px solid rgba(255,0,85,.3);color:#ff0055}
.footer{margin-top:20px;color:var(--text2);font-size:12px}
.footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="hero">
  <div class="badge">🔔 Round 2 — ספטמבר 2026</div>
  <h1>הצטרף לרשימת ההמתנה</h1>
  <p class="sub">גישה ראשונה למשקיעים מוקדמים.<br>Round 1 נסגר ב-9 משקיעים — אל תפספסו את Round 2.</p>
  <div class="stats">
    <div class="stat"><div class="stat-val">9</div><div class="stat-label">משקיעי Round 1</div></div>
    <div class="stat"><div class="stat-val">$159</div><div class="stat-label">גויס עד כה</div></div>
    <div class="stat"><div class="stat-val">ספטמבר</div><div class="stat-label">Round 2 פתיחה</div></div>
  </div>
  <div class="form-box">
    <h2>✍️ השאירו פרטים</h2>
    <div class="field"><label>שם מלא *</label><input type="text" id="name" placeholder="ישראל ישראלי" required></div>
    <div class="field"><label>אימייל *</label><input type="email" id="email" placeholder="you@example.com" required></div>
    <div class="field"><label>טלגרם (username)</label><input type="text" id="telegram" placeholder="@username"></div>
    <div class="field">
      <label>כמה BNB בתכנון להשקיע?</label>
      <select id="bnb">
        <option value="">— בחרו טווח —</option>
        <option value="0.05-0.5">0.050.5 BNB (מינימום)</option>
        <option value="0.5-2">0.52 BNB</option>
        <option value="2-5">25 BNB (מקסימום)</option>
        <option value="5+">מעל 5 BNB (צרו קשר)</option>
      </select>
    </div>
    <button class="btn" onclick="submit()">🚀 הרשמה לרשימת המתנה</button>
    <div class="msg" id="msg"></div>
  </div>
  <div class="footer">
    <a href="/ido.html">← מידע מלא על ה-IDO</a> &nbsp;·&nbsp;
    <a href="https://t.me/SLH_AIR_bot" target="_blank">Telegram</a>
  </div>
</div>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxqLvA0qCaSyFCgyo1of8OrZ-skuSRpu6eE3ooS8HFJbAzIVMSKEn37V65YMh9rriH4/exec';
async function submit() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const telegram = document.getElementById('telegram').value.trim();
  const bnb = document.getElementById('bnb').value;
  const msg = document.getElementById('msg');
  const btn = document.querySelector('.btn');
  if (!name || !email) { showMsg('err', 'שם ואימייל הם שדות חובה'); return; }
  if (!email.includes('@')) { showMsg('err', 'אימייל לא תקין'); return; }
  btn.disabled = true;
  btn.textContent = 'שולח...';
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, email, telegram, bnb})
    });
    showMsg('ok', '✅ נרשמת בהצלחה! נעדכן אותך לפני פתיחת Round 2.');
    btn.textContent = '✅ נרשמת!';
    document.getElementById('name').value = '';
    document.getElementById('email').value = '';
    document.getElementById('telegram').value = '';
    document.getElementById('bnb').value = '';
  } catch(e) {
    showMsg('err', 'שגיאה בשליחה — נסו שוב');
    btn.disabled = false;
    btn.textContent = '🚀 הרשמה לרשימת המתנה';
  }
}
function showMsg(type, text) {
  const msg = document.getElementById('msg');
  msg.className = 'msg ' + type;
  msg.textContent = text;
  msg.style.display = 'block';
}
</script>
</body>
</html>
