function setLang(lang) {
    currentLang = lang;
    const sl = PAGE_T[lang] || PAGE_T.en;
    const isRTL = (lang === 'he' || lang === 'ar');
    document.documentElement.lang = lang;
    document.documentElement.dir = isRTL ? 'rtl' : 'ltr';

    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (sl[key]) el.textContent = sl[key];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (sl[key]) el.placeholder = sl[key];
    });

    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.trim().toLowerCase() === lang);
    });
}

}

function drawQR(ctx, data, x, y, size) {
    const modules = 21;
    const cellSize = size / modules;
    let bits = [];
    for (let i = 0; i < data.length; i++) {
        let code = data.charCodeAt(i);
        for (let b = 7; b >= 0; b--) bits.push((code >> b) & 1);
    }
    while (bits.length < modules * modules) bits.push(bits.length % 3 === 0 ? 1 : 0);

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x, y, size, size);
    ctx.fillStyle = '#000000';

    function drawFinder(fx, fy) {
        ctx.fillRect(fx, fy, cellSize * 7, cellSize * 7);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(fx + cellSize, fy + cellSize, cellSize * 5, cellSize * 5);
        ctx.fillStyle = '#000000';
        ctx.fillRect(fx + cellSize * 2, fy + cellSize * 2, cellSize * 3, cellSize * 3);
    }
    drawFinder(x, y);
    drawFinder(x + cellSize * (modules - 7), y);
    drawFinder(x, y + cellSize * (modules - 7));

    for (let row = 0; row < modules; row++) {
        for (let col = 0; col < modules; col++) {
            if ((row < 8 && col < 8) || (row < 8 && col >= modules - 8) || (row >= modules - 8 && col < 8)) continue;
            let idx = row * modules + col;
            if (bits[idx % bits.length]) {
                ctx.fillStyle = '#000000';
                ctx.fillRect(x + col * cellSize, y + row * cellSize, cellSize, cellSize);
            }
        }
    }
}

function generateCard() {
    const canvas = document.getElementById('rc-canvas');
    const ctx = canvas.getContext('2d');
    const w = 800, h = 500;
    canvas.width = w;
    canvas.height = h;
    const sl = PAGE_T[currentLang] || PAGE_T.en;
    const refLink = getRefLink();
    const username = document.getElementById('rc-username').value.trim() || 'YOUR_ID';
    const bot = BOTS[selectedBot] || BOTS.airdrop;

    // Background
    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, '#050510');
    grad.addColorStop(0.3, '#0c0c24');
    grad.addColorStop(0.7, '#0a0a1e');
    grad.addColorStop(1, '#050510');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // Grid overlay
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 1;
    for (let gx = 0; gx < w; gx += 40) {
        ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, h); ctx.stroke();
    }
    for (let gy = 0; gy < h; gy += 40) {
        ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke();
    }

    // Decorative orbs
    const orbGrad = ctx.createRadialGradient(120, 80, 0, 120, 80, 220);
    orbGrad.addColorStop(0, 'rgba(108,92,231,0.18)');
    orbGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = orbGrad;
    ctx.fillRect(0, 0, 400, 350);

    const orbGrad2 = ctx.createRadialGradient(680, 420, 0, 680, 420, 200);
    orbGrad2.addColorStop(0, 'rgba(0,206,201,0.12)');
    orbGrad2.addColorStop(1, 'transparent');
    ctx.fillStyle = orbGrad2;
    ctx.fillRect(400, 200, 400, 300);

    // Border
    ctx.strokeStyle = '#6c5ce7';
    ctx.lineWidth = 3;
    ctx.strokeRect(10, 10, w - 20, h - 20);
    ctx.strokeStyle = 'rgba(0,206,201,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(16, 16, w - 32, h - 32);

    // Top decorative line
    const lineGrad = ctx.createLinearGradient(40, 30, w - 40, 30);
    lineGrad.addColorStop(0, 'transparent');
    lineGrad.addColorStop(0.2, '#6c5ce7');
    lineGrad.addColorStop(0.8, '#00cec9');
    lineGrad.addColorStop(1, 'transparent');
    ctx.strokeStyle = lineGrad;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(40, 30);
    ctx.lineTo(w - 40, 30);
    ctx.stroke();

    // Logo / Brand
    ctx.textAlign = 'center';
    ctx.font = 'bold 44px "Space Grotesk", sans-serif';
    ctx.fillStyle = '#a29bfe';
    ctx.fillText('SLH ECOSYSTEM', w / 2, 78);

    ctx.font = 'bold 13px "Space Mono", monospace';
    ctx.fillStyle = '#7878a0';
    ctx.fillText('SPARK IND | Digital Investment House | Built in Israel', w / 2, 102);

    // Headline
    ctx.font = 'bold 32px "Space Grotesk", sans-serif';
    const headGrad = ctx.createLinearGradient(180, 145, 620, 145);
    headGrad.addColorStop(0, '#6c5ce7');
    headGrad.addColorStop(0.5, '#00cec9');
    headGrad.addColorStop(1, '#ffd32a');
    ctx.fillStyle = headGrad;
    ctx.fillText(sl.rc_headline || 'Join the SLH Ecosystem', w / 2, 152);

    // Commission badge
    ctx.font = 'bold 20px "Inter", sans-serif';
    ctx.fillStyle = '#00cec9';
    ctx.fillText(sl.rc_commission || '15% commission on every referral', w / 2, 192);

    // Separator
    ctx.strokeStyle = 'rgba(108,92,231,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(80, 215); ctx.lineTo(w - 80, 215); ctx.stroke();

    // Bot info
    ctx.font = '600 16px "Inter", sans-serif';
    ctx.fillStyle = '#eaeaf5';
    ctx.fillText('Bot: @' + bot.username, w / 2, 250);

    // Referrer username
    ctx.font = '500 14px "Inter", sans-serif';
    ctx.fillStyle = '#a29bfe';
    ctx.fillText('Invited by: ' + (username.startsWith('@') ? username : '@' + username), w / 2, 278);

    // Referral link
    ctx.font = '500 14px "Space Mono", monospace';
    ctx.fillStyle = '#ffd32a';
    ctx.fillText(refLink, w / 2, 310);

    // QR Code (left-center area)
    drawQR(ctx, refLink, w / 2 - 65, 330, 130);

    // Bottom decorative line
    ctx.strokeStyle = lineGrad;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(40, h - 30); ctx.lineTo(w - 40, h - 30); ctx.stroke();

    // Footer
    ctx.font = '11px "Inter", sans-serif';
    ctx.fillStyle = '#7878a0';
    ctx.fillText('slh-nft.com | 20+ Telegram Bots | Blockchain Verified | @SLH_AIR_bot', w / 2, h - 16);

    // Show
    document.getElementById('rc-preview').style.display = 'block';
    document.getElementById('rc-preview').scrollIntoView({behavior: 'smooth'});
}

function downloadCard() {
    const canvas = document.getElementById('rc-canvas');
    const link = document.createElement('a');
    link.download = 'SLH-Referral-Card.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
}

function shareTelegram() {
    const link = getRefLink();
    const sl = PAGE_T[currentLang] || PAGE_T.en;
    const msg = (sl.rc_share_msg || 'Join SLH!') + ' ' + link;
    window.open('https://t.me/share/url?url=' + encodeURIComponent(link) + '&text=' + encodeURIComponent(msg), '_blank');
}

function shareWhatsApp() {
    const link = getRefLink();
    const sl = PAGE_T[currentLang] || PAGE_T.en;
    const msg = (sl.rc_share_msg || 'Join SLH!') + ' ' + link;
    window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

function shareFacebook() {
    const link = getRefLink();
    window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(link), '_blank');
}
