<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ffd32a"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd32a"/>
      <stop offset="100%" style="stop-color:#fff176"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#4a3ab5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="0" dy="1"/>
      <feGaussianBlur stdDeviation="0.5"/>
      <feComposite operator="out" in="SourceGraphic"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feComposite operator="over" in="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Outer hexagon shape -->
  <polygon points="18,1.5 32.5,9.75 32.5,26.25 18,34.5 3.5,26.25 3.5,9.75"
           fill="url(#bgGrad)" stroke="none"/>

  <!-- Inner hexagon border accent -->
  <polygon points="18,4 30,11 30,25 18,32 6,25 6,11"
           fill="none" stroke="url(#logoGrad)" stroke-width="0.6" opacity="0.5"/>

  <!-- Faceted diamond highlight top-left -->
  <polygon points="18,1.5 3.5,9.75 18,4 32.5,9.75"
           fill="#8b7cf7" opacity="0.25"/>

  <!-- Lightning bolt -->
  <path d="M 20.5,7 L 14,18.5 L 18.5,18.5 L 15.5,29 L 24,17 L 19.5,17 L 23,7 Z"
        fill="url(#boltGrad)" filter="url(#glow)"/>

  <!-- Bolt highlight streak -->
  <path d="M 21,8.5 L 15.5,18 L 18.8,18 L 16.5,27 L 17.5,24.5 L 19.5,18.2 L 16.5,18.2 L 21.5,9 Z"
        fill="#ffffff" opacity="0.2"/>

  <!-- Small sparkle accents -->
  <circle cx="10" cy="13" r="0.6" fill="#ffd32a" opacity="0.7"/>
  <circle cx="27" cy="23" r="0.5" fill="#ffd32a" opacity="0.6"/>
  <circle cx="25" cy="10" r="0.4" fill="#ffffff" opacity="0.5"/>
</svg>