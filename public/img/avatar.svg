<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="avatarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d3f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="avatarAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="20" cy="20" r="19"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="20" cy="20" r="19" fill="url(#avatarBg)" stroke="url(#avatarAccent)" stroke-width="1.5"/>

  <!-- User silhouette clipped to circle -->
  <g clip-path="url(#circleClip)">
    <!-- Head -->
    <circle cx="20" cy="15" r="6" fill="#4a4a6a"/>
    <!-- Body/shoulders -->
    <ellipse cx="20" cy="36" rx="12" ry="11" fill="#4a4a6a"/>
  </g>

  <!-- Subtle ring highlight -->
  <circle cx="20" cy="20" r="18" fill="none" stroke="#6c5ce7" stroke-width="0.3" opacity="0.5"/>
</svg>