<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLH Mass Gift — מתנות מרוכזות לכל המשתמשים</title>
<link rel="icon" type="image/png" href="/favicon-32.png">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--bg:#050810;--bg2:#0d1220;--gold:#ffd700;--green:#00e887;--red:#ff4444;--purple:#a855f7;--text:#f5f5f8;--text2:#9ba0b5;--border:rgba(255,215,0,.2)}
*{box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Rubik',sans-serif;margin:0;min-height:100vh;line-height:1.5}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(circle at 20% 20%,rgba(255,215,0,.08),transparent 50%),radial-gradient(circle at 80% 80%,rgba(0,232,135,.06),transparent 50%)}
.container{max-width:900px;margin:40px auto;padding:0 20px}
.header{text-align:center;margin-bottom:30px}
.header h1{font-size:34px;font-weight:900;margin:0 0 8px;background:linear-gradient(135deg,var(--gold),var(--green));-webkit-background-clip:text;background-clip:text;color:transparent}
.header p{color:var(--text2);font-size:14px}
.back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:var(--bg2);border:1px solid var(--border);color:var(--text);text-decoration:none;border-radius:10px;font-size:13px;margin-bottom:20px}
.back:hover{border-color:var(--gold)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px}
.card h2{margin:0 0 16px;font-size:20px;font-weight:900;color:var(--gold)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-row.single{grid-template-columns:1fr}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
input,select,textarea{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:10px;font-size:15px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold)}
.btn{padding:14px 24px;background:linear-gradient(135deg,var(--gold),var(--green));color:#000;border:none;border-radius:12px;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;transition:all .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(255,215,0,.3)}
.btn.secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn.danger{background:var(--red);color:#fff}
.btn.secondary:hover{border-color:var(--gold);color:var(--gold)}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
.preview-box{background:var(--bg);border:1px solid var(--green);border-radius:14px;padding:20px;margin-top:20px;display:none}
.preview-box.show{display:block}
.preview-box h3{margin:0 0 12px;color:var(--green);font-size:18px}
.kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px}
.kv b{color:var(--gold)}
.user-sample{margin-top:12px;font-size:12px;color:var(--text2);max-height:200px;overflow-y:auto}
.user-sample div{padding:4px 0;border-bottom:1px dotted rgba(255,255,255,.05)}
.alert{padding:14px;border-radius:12px;margin-bottom:14px;font-size:14px}
.alert.warning{background:rgba(255,215,0,.08);border:1px solid var(--gold);color:var(--gold)}
.alert.success{background:rgba(0,232,135,.08);border:1px solid var(--green);color:var(--green)}
.alert.error{background:rgba(255,68,68,.08);border:1px solid var(--red);color:var(--red)}
.history-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;font-size:13px;flex-wrap:wrap;gap:10px}
.history-item .when{color:var(--text2)}
.history-item .token{color:var(--gold);font-weight:800}
.login-gate{max-width:460px;margin:100px auto;padding:40px 32px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;text-align:center}
.login-gate h2{color:var(--gold);margin-bottom:12px}
</style>
</head>
<body>

<div id="login-gate" class="login-gate" style="display:none">
  <h2>🔐 Mass Gift — Admin Only</h2>
  <input type="password" id="login-pwd" placeholder="סיסמת אדמין">
  <button class="btn" style="width:100%;margin-top:12px" onclick="doLogin()">היכנס</button>
</div>

<div id="main" style="display:none">
<div id="topnav-root"></div>
<div class="container">
  <a href="/admin.html" class="back"><i class="fas fa-arrow-right"></i> חזרה לאדמין</a>
  <div class="header">
    <h1>🎁 מתנות מרוכזות</h1>
    <p>שליחת טוקנים לכל המשתמשים ברצף יחיד · Dry-run לפני ביצוע · תיעוד מלא</p>
  </div>

  <div class="alert warning">
    ⚠️ פעולה זו מזכה את <strong>כל המשתמשים הרשומים</strong> במערכת. השתמש באחריות.
    תמיד הרץ Dry-Run תחילה לראות כמה משתמשים יושפעו.
  </div>

  <div class="card">
    <h2>🎁 שלח מתנה חדשה</h2>
    <div class="form-row">
      <div>
        <label>טוקן</label>
        <select id="token">
          <option value="ZVK">ZVK (פעילות · 4.4₪)</option>
          <option value="MNH">MNH (יציב · 1₪)</option>
          <option value="SLH">SLH (פרימיום · 444₪)</option>
          <option value="REP">REP (ציון מוניטין)</option>
        </select>
      </div>
      <div>
        <label>כמות לכל משתמש</label>
        <input type="number" id="amount" value="10" min="0.01" max="10000" step="0.01">
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>סיבה (לוג)</label>
        <select id="reason">
          <option value="campaign_gift">מבצע / קמפיין</option>
          <option value="welcome_bonus">ברכת פתיחה</option>
          <option value="holiday_gift">מתנת חג</option>
          <option value="apology">פיצוי / התנצלות</option>
          <option value="milestone">אבן דרך</option>
          <option value="other">אחר</option>
        </select>
      </div>
      <div>
        <label>רק משתמשים פעילים ב-N ימים (אופציונלי)</label>
        <input type="number" id="active_days" placeholder="השאר ריק לכל המשתמשים" min="1">
      </div>
    </div>
    <div class="form-row single">
      <div>
        <label>הערה ללוג (אופציונלי)</label>
        <input type="text" id="note" placeholder="לדוגמה: מתנת השקה לקמפיין shekel_april26">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn secondary" onclick="runMassGift(true)">
        <i class="fas fa-eye"></i> Dry Run (תצוגה מקדימה)
      </button>
      <button class="btn danger" onclick="confirmExecute()">
        <i class="fas fa-paper-plane"></i> בצע שליחה בפועל
      </button>
    </div>
    <div id="preview-box" class="preview-box"></div>
  </div>

  <div class="card">
    <h2>📜 היסטוריית מתנות אחרונות</h2>
    <button class="btn secondary" onclick="loadHistory()"><i class="fas fa-sync"></i> טען היסטוריה</button>
    <div id="history" style="margin-top:16px"></div>
  </div>
</div>
</div>

<script>
const API_BASE = 'https://slh-api-production.up.railway.app';
function getAdminKey(){ return localStorage.getItem('slh_admin_password') || ''; }
function checkAuth(){
  const p = getAdminKey();
  if(p && p.length >= 6){
    document.getElementById('login-gate').style.display='none';
    document.getElementById('main').style.display='block';
    loadHistory();
    return true;
  }
  document.getElementById('login-gate').style.display='block';
  document.getElementById('main').style.display='none';
}
function doLogin(){
  const p = document.getElementById('login-pwd').value;
  if(p && p.length>=6){ localStorage.setItem('slh_admin_password', p); checkAuth(); }
}
document.getElementById('login-pwd')?.addEventListener('keypress', e=>{ if(e.key==='Enter') doLogin(); });

async function runMassGift(dryRun){
  const body = {
    token: document.getElementById('token').value,
    amount: parseFloat(document.getElementById('amount').value) || 10,
    reason: document.getElementById('reason').value,
    note: document.getElementById('note').value,
    dry_run: dryRun
  };
  const days = parseInt(document.getElementById('active_days').value);
  if(days > 0) body.only_active_days = days;

  const box = document.getElementById('preview-box');
  box.className = 'preview-box show';
  box.innerHTML = '<div style="color:var(--text2)">⏳ שולח בקשה...</div>';

  try {
    const r = await fetch(`${API_BASE}/api/admin/mass-gift`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Admin-Key': getAdminKey()
      },
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if(!r.ok){ throw new Error(d.detail || 'API error'); }
    renderResult(d, dryRun);
  } catch(e) {
    box.innerHTML = `<div style="color:var(--red)">❌ שגיאה: ${e.message}</div>`;
  }
}

function renderResult(d, dryRun){
  const box = document.getElementById('preview-box');
  if(dryRun){
    const p = d.preview || {};
    const sample = (p.users_sample || []).map(u =>
      `<div>ID ${u.telegram_id} · @${u.username || '—'} · ${u.first_name || '—'}</div>`
    ).join('');
    box.innerHTML = `
      <h3>🔍 Dry Run — תצוגה מקדימה</h3>
      <div class="kv"><span>מספר משתמשים שיושפעו:</span> <b>${p.users_count}</b></div>
      <div class="kv"><span>טוקן:</span> <b>${p.token}</b></div>
      <div class="kv"><span>כמות לכל משתמש:</span> <b>${p.amount_per_user}</b></div>
      <div class="kv"><span>סה״כ הפצה:</span> <b>${p.total_distribution}</b></div>
      <div class="kv"><span>סיבה:</span> <b>${p.reason}</b></div>
      <div class="user-sample">${sample || 'אין דוגמאות זמינות'}</div>
      <div style="margin-top:14px;padding:12px;background:rgba(255,215,0,.08);border-radius:10px;font-size:13px;color:var(--gold)">
        ✅ הכל נראה תקין? לחץ על "בצע שליחה בפועל" למעלה.
      </div>
    `;
  } else {
    box.innerHTML = `
      <h3>✅ הופץ בהצלחה!</h3>
      <div class="kv"><span>זוכו:</span> <b>${d.credited_count}</b></div>
      <div class="kv"><span>נכשלו:</span> <b style="color:var(--red)">${d.failed_count}</b></div>
      <div class="kv"><span>סה״כ הופץ:</span> <b>${d.total_amount_distributed} ${d.token}</b></div>
      ${d.failures && d.failures.length ? `<div style="margin-top:12px;font-size:12px;color:var(--red)">כשלונות: ${JSON.stringify(d.failures)}</div>` : ''}
    `;
    loadHistory();
  }
}

function confirmExecute(){
  const amount = document.getElementById('amount').value;
  const token = document.getElementById('token').value;
  if(!confirm(`האם אתה בטוח? זה יחלק ${amount} ${token} לכל משתמש רשום. לא ניתן לבטל.`)) return;
  runMassGift(false);
}

async function loadHistory(){
  const div = document.getElementById('history');
  div.innerHTML = '<div style="color:var(--text2)">טוען...</div>';
  try {
    const r = await fetch(`${API_BASE}/api/admin/mass-gift/history?limit=10`, {
      headers: { 'X-Admin-Key': getAdminKey() }
    });
    const d = await r.json();
    if(!d.history || d.history.length === 0){
      div.innerHTML = '<div style="color:var(--text2);text-align:center;padding:20px">אין היסטוריה עדיין</div>';
      return;
    }
    div.innerHTML = d.history.map(h => `
      <div class="history-item">
        <div>
          <div class="token">${h.token} · ${h.total_amount}</div>
          <div class="when">${new Date(h.when).toLocaleString('he-IL')} · ${h.users_credited} משתמשים</div>
        </div>
        <div style="color:var(--text2);font-size:12px">${h.reason || '—'}</div>
      </div>
    `).join('');
  } catch(e) {
    div.innerHTML = `<div style="color:var(--red)">שגיאה: ${e.message}</div>`;
  }
}

checkAuth();
</script>

<script src="/js/ai-assistant.js"></script>
</body>
</html>
