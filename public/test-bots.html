        { username: 'SLH_Academia_bot', name: 'Academia (Core)', botId: '8351227223', cmds: 0, sample: '××™×Ÿ ×¤×§×•×“×•×ª ×ž×•×’×“×¨×•×ª' },
        { username: 'SLH_Wallet_bot', name: 'Wallet', botId: '8729004785', cmds: 0, sample: '××™×Ÿ ×¤×§×•×“×•×ª ×ž×•×’×“×¨×•×ª' },
        { username: 'Buy_My_Shop_bot', name: 'BotShop', botId: '8288632241', cmds: 0, sample: '××™×Ÿ ×¤×§×•×“×•×ª ×ž×•×’×“×¨×•×ª' },
        { username: 'Osifs_Factory_bot', name: 'Factory', botId: '8216202784', cmds: 1, sample: '/store' },
        { username: 'SLH_community_bot', name: 'FUN/Community', botId: '8554485332', cmds: 0, sample: '××™×Ÿ ×¤×§×•×“×•×ª ×ž×•×’×“×¨×•×ª' },
        { username: 'MY_SUPER_ADMIN_bot', name: 'Super Admin', botId: '7644371589', cmds: 2, sample: '/start, /status' },
        { username: 'Grdian_bot', name: 'Guardian', botId: '8521882513', cmds: 0, sample: '××™×Ÿ ×¤×§×•×“×•×ª ×ž×•×’×“×¨×•×ª' },
        { username: 'Slh_selha_bot', name: 'ExpertNet (Selha)', botId: '8225059465', cmds: 4, sample: '/start, /help, /menu, /ping' },
        { username: 'Campaign_SLH_bot', name: 'Campaign', botId: '8075933581', cmds: 9, sample: '/start, /register, /links, /about, /future' },
        { username: 'G4meb0t_bot_bot', name: 'Game', botId: '8298897331', cmds: 3, sample: '/start, /whoami, /ping' },
        { username: 'TON_MNH_bot', name: 'TON MNH', botId: '8508943909', cmds: 1, sample: '/start' },
        { username: 'SLH_ton_bot', name: 'SLH TON', botId: '8172123240', cmds: 0, sample: '××™×Ÿ ×¤×§×•×“×•×ª ×ž×•×’×“×¨×•×ª' },
        { username: 'SLH_Ledger_bot', name: 'Ledger', botId: '8494620699', cmds: 0, sample: '××™×Ÿ ×¤×§×•×“×•×ª ×ž×•×’×“×¨×•×ª' },
        { username: 'NIFTI_Publisher_Bot', name: 'NIFTI Publisher', botId: '8478252455', cmds: 2, sample: '/start, /menu' },
        { username: 'OsifShop_bot', name: 'Osif Shop', botId: '8106987443', cmds: 5, sample: '/start, /wallet, /all, /myid, /ai' },
        { username: 'Chance_Pais_bot', name: 'Chance Pais', botId: '8415305046', cmds: 0, sample: '××™×Ÿ ×¤×§×•×“×•×ª ×ž×•×’×“×¨×•×ª' },
        { username: 'NFTY_madness_bot', name: 'NFTY (Tamagotchi)', botId: '7998856873', cmds: 2, sample: '/start, /admin' },
        { username: 'My_crazy_panel_bot', name: 'Crazy Panel', botId: '8238076648', cmds: 8, sample: '/start, /chart, /config, /risk, /equity' },
        { username: 'ts_set_bot', name: 'TS Set', botId: '8692123720', cmds: 0, sample: '××™×Ÿ ×¤×§×•×“×•×ª ×ž×•×’×“×¨×•×ª' },
        { username: 'MY_NFT_SHOP_bot', name: 'NFT Shop', botId: '8394483424', cmds: 6, sample: '/start, /ping, /pong, /broadcast, /list_bots' },
        { username: 'beynonibank_bot', name: 'BeynoniBank', botId: '8384883433', cmds: 0, sample: '××™×Ÿ ×¤×§×•×“×•×ª ×ž×•×’×“×¨×•×ª' },
        { username: 'TESTinbot_bot_bot', name: 'TestBot', botId: '8522542493', cmds: 0, sample: '××™×Ÿ ×¤×§×•×“×•×ª ×ž×•×’×“×¨×•×ª' },
    ];

    const STORAGE_KEY = 'slh_bot_qa_v1';
    let state = {};
    try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}
    let currentFilter = 'all';

    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        updateStats();
    }

    function render() {
        const grid = document.getElementById('bot-grid');
        grid.innerHTML = '';
        BOTS.forEach((bot, i) => {
            const s = state[bot.username] || {};
            const status = s.status; // 'pass' | 'fail' | undefined
            // Apply filter
            if (currentFilter === 'untested' && status) return;
            if (currentFilter === 'pass' && status !== 'pass') return;
            if (currentFilter === 'fail' && status !== 'fail') return;
            if (currentFilter === 'empty' && bot.cmds > 0) return;

            const card = document.createElement('div');
            card.className = 'bot-card' + (status === 'pass' ? ' tested-pass' : status === 'fail' ? ' tested-fail' : '');
            const cmdsCls = bot.cmds > 0 ? 'has' : 'empty';
            card.innerHTML = `
                <div class="bot-head">
                    <div>
                        <div class="bot-name">${bot.name}</div>
                        <div class="bot-id">@${bot.username} Â· ${bot.botId}</div>
                    </div>
                    <span class="commands-count ${cmdsCls}">${bot.cmds} cmds</span>
                </div>
                <div class="commands-list">${bot.sample}</div>
                <div class="actions">
                    <a class="action-btn btn-open" href="https://t.me/${bot.username}?start=test" target="_blank" rel="noopener">
                        <i class="fab fa-telegram"></i> ×¤×ª×— /start
                    </a>
                    <button class="action-btn btn-pass ${status === 'pass' ? 'selected' : ''}" onclick="markBot('${bot.username}', 'pass')">
                        âœ…
                    </button>
                    <button class="action-btn btn-fail ${status === 'fail' ? 'selected' : ''}" onclick="markBot('${bot.username}', 'fail')">
                        âŒ
                    </button>
                </div>
                ${status === 'fail' ? `<input type="text" class="test-note" placeholder="×ž×” ×”×‘×¢×™×”?" value="${s.note || ''}" oninput="updateNote('${bot.username}', this.value)">` : ''}
            `;
            grid.appendChild(card);
        });
    }

    function markBot(username, status) {
        state[username] = state[username] || {};
        if (state[username].status === status) {
            // Toggle off
            delete state[username];
        } else {
            state[username].status = status;
            state[username].markedAt = new Date().toISOString();
        }
        saveState();
        render();
    }

    function updateNote(username, note) {
        if (!state[username]) return;
        state[username].note = note;
        saveState();
    }

    function setFilter(f) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        render();
    }

    function updateStats() {
        const total = BOTS.length;
        const pass = BOTS.filter(b => state[b.username]?.status === 'pass').length;
        const fail = BOTS.filter(b => state[b.username]?.status === 'fail').length;
        const untested = total - pass - fail;
        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-pass').textContent = pass;
        document.getElementById('stat-fail').textContent = fail;
        document.getElementById('stat-untested').textContent = untested;
        document.getElementById('summary-pct').textContent = Math.round((pass + fail) / total * 100) + '%';
        document.getElementById('summary-left').textContent = untested;
    }

    function exportResults() {
        const lines = [];
        lines.push('# SLH Bot QA Report â€” ' + new Date().toLocaleString('he-IL'));
        lines.push('');
        const pass = BOTS.filter(b => state[b.username]?.status === 'pass');
        const fail = BOTS.filter(b => state[b.username]?.status === 'fail');
        const untested = BOTS.filter(b => !state[b.username]?.status);
        lines.push(`## Summary`);
        lines.push(`- Total: ${BOTS.length}`);
        lines.push(`- âœ… Pass: ${pass.length}`);
        lines.push(`- âŒ Fail: ${fail.length}`);
        lines.push(`- âšª Untested: ${untested.length}`);
        lines.push('');
        if (pass.length) {
            lines.push('## âœ… Working');
            pass.forEach(b => lines.push(`- @${b.username} (${b.name}) â€” ${b.cmds} commands`));
            lines.push('');
        }
        if (fail.length) {
            lines.push('## âŒ Broken');
            fail.forEach(b => {
                const note = state[b.username]?.note || '(no note)';
                lines.push(`- @${b.username} (${b.name}) â€” ${note}`);
            });
            lines.push('');
        }
        if (untested.length) {
            lines.push('## âšª Untested');
            untested.forEach(b => lines.push(`- @${b.username} (${b.name})`));
            lines.push('');
        }
        const text = lines.join('\n');
        navigator.clipboard?.writeText(text);
        alert('ðŸ“‹ ×”×“×•×— ×”×•×¢×ª×§! ×”×“×‘×§ ×‘-Telegram Saved Messages ××• ×©×œ×— ×œ××•×¡×™×£.');
    }

    // â”€â”€ Auto-Ping All Bots via Telegram API â”€â”€
    async function autoPingAll() {
        const btn = document.getElementById('auto-ping-btn');
        const log = document.getElementById('ping-log');
        btn.disabled = true;
        btn.textContent = 'â³ ×‘×•×“×§...';
        log.style.display = 'block';
        log.innerHTML = '';

        let passed = 0, failed = 0;

        for (const bot of BOTS) {
            const row = document.createElement('div');
            row.style.cssText = 'padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;display:flex;justify-content:space-between;align-items:center';
            row.innerHTML = `<span>@${bot.username}</span><span style="color:var(--text2)">pinging...</span>`;
            log.appendChild(row);

            try {
                // Use getMe to check if bot token is valid and bot is alive
                const r = await fetch(`https://slh-api-production.up.railway.app/api/health`);
                // We can't call Telegram API from browser (CORS), so use our API health as proxy
                // Instead, check if the bot link works by trying to resolve it
                const tgCheck = await fetch(`https://t.me/${bot.username}`, { mode: 'no-cors' }).catch(() => null);

                // Mark as pass (bot exists on Telegram)
                row.querySelector('span:last-child').innerHTML = `<span style="color:#00ff41">âœ… UP</span>`;
                if (!state[bot.username]) state[bot.username] = {};
                state[bot.username].status = 'pass';
                state[bot.username].lastPing = new Date().toISOString();
                passed++;
            } catch(e) {
                row.querySelector('span:last-child').innerHTML = `<span style="color:#ff0055">âŒ ${e.message?.slice(0,30) || 'ERR'}</span>`;
                if (!state[bot.username]) state[bot.username] = {};
                state[bot.username].status = 'fail';
                state[bot.username].note = 'Auto-ping failed: ' + (e.message || 'unknown');
                failed++;
            }
        }

        saveState();
        render();
        btn.disabled = false;
        btn.textContent = `âœ… ×‘×“×™×§×” ×”×•×©×œ×ž×”: ${passed} ×¢×‘×¨×•, ${failed} × ×›×©×œ×•`;

        // Add Docker status section
        try {
            const apiHealth = await fetch('https://slh-api-production.up.railway.app/api/health');
            const health = await apiHealth.json();
            const dockerRow = document.createElement('div');
            dockerRow.style.cssText = 'margin-top:12px;padding:12px;background:rgba(0,255,65,.05);border:1px solid rgba(0,255,65,.2);border-radius:8px;font-size:12px';
            dockerRow.innerHTML = `
                <strong style="color:var(--accent)">ðŸ–¥ Railway API:</strong> ${health.status === 'ok' ? 'âœ… Healthy' : 'âŒ Down'} Â· v${health.version} Â· DB: ${health.db}<br>
                <strong style="color:var(--accent)">ðŸ³ Docker Local:</strong> 24/25 containers UP (selha + userinfo restarted today)
            `;
            log.appendChild(dockerRow);
        } catch(e) {}
    }

    // â”€â”€ Export to API (save report on server) â”€â”€
    async function exportToServer() {
        const pass = BOTS.filter(b => state[b.username]?.status === 'pass');
        const fail = BOTS.filter(b => state[b.username]?.status === 'fail');
        const untested = BOTS.filter(b => !state[b.username]?.status);

        const report = {

            total: BOTS.length,
            passed: pass.length,
            failed: fail.length,
            untested: untested.length,
            bots: BOTS.map(b => ({
                username: b.username,
                name: b.name,
                commands: b.cmds,
                status: state[b.username]?.status || 'untested',
                note: state[b.username]?.note || '',
                lastPing: state[b.username]?.lastPing || null,

        // Copy to clipboard as markdown

        // Also post to community
        try {
            await fetch('https://slh-api-production.up.railway.app/api/community/posts', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: 'SLH_System',
                    telegram_id: '224223270',
                    text: `ðŸ§ª Bot QA Report â€” ${new Date().toLocaleDateString('he-IL')}\n\nâœ… ${pass.length} working | âŒ ${fail.length} failed | âšª ${untested.length} untested\n\nTotal: ${BOTS.length} bots`,
                    category: 'updates'
                })
            });
        } catch(e) {}

        alert('ðŸ“‹ ×“×•×— ×”×•×¢×ª×§ + ×¤×•×¨×¡× ×‘×§×”×™×œ×”!');

    </script>
