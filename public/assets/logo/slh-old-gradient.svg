<?xml version="1.0" encoding="UTF-8"?>
<!--
  SLH Spark — Legacy text logo (preserved for backward compatibility)
  Used historically in topbars; matches the gradient text "SLH" effect.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="SLH legacy logo">
  <defs>
    <linearGradient id="oldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="96" height="96" rx="20" fill="url(#oldGrad)"/>
  <text x="50" y="68" font-family="Inter, system-ui, sans-serif"
        font-size="38" font-weight="900" fill="#03060f"
        text-anchor="middle" letter-spacing="-1">SLH</text>
</svg>
