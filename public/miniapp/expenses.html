<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SLH — מעקב הוצאות</title>
<link rel="stylesheet" href="miniapp.css" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
  .stat-tile { background: var(--tg-card); border-radius: 10px; padding: 14px; text-align: center; }
  .stat-tile .n { font-size: 22px; font-weight: 700; color: var(--tg-fg); }
  .stat-tile .l { font-size: 11px; color: var(--tg-hint); margin-top: 2px; }
  .stat-tile.burn .n { color: var(--slh-warn); }

  .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: var(--tg-card); border-radius: 8px; margin-bottom: 6px; }
  .row .info { flex: 1; min-width: 0; }
  .row .desc { color: var(--tg-fg); font-size: 13px; overflow: hidden; text-overflow: ellipsis; }
  .row .meta { color: var(--tg-hint); font-size: 11px; margin-top: 2px; }
  .row .amount { font-weight: 700; font-size: 14px; color: var(--tg-fg); margin-right: 8px; }
  .row .recurring { background: rgba(255,165,0,.15); color: var(--slh-warn); font-size: 10px; padding: 1px 6px; border-radius: 3px; margin-right: 4px; }

  .add-form { display: grid; gap: 8px; }
  .add-form input, .add-form select, .add-form textarea {
    background: var(--tg-bg); color: var(--tg-fg); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; padding: 10px 12px; font-family: inherit; font-size: 13px;
  }
  .add-form .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .cat-bar { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
  .cat-bar .item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .cat-bar .item .label { min-width: 110px; color: var(--tg-fg); }
  .cat-bar .item .bar { flex: 1; height: 8px; background: var(--tg-bg); border-radius: 4px; overflow: hidden; }
  .cat-bar .item .bar > div { height: 100%; background: linear-gradient(90deg, var(--tg-accent), var(--slh-success)); }
  .cat-bar .item .amt { color: var(--tg-fg); font-weight: 600; min-width: 70px; text-align: left; }

  .month-bar { display: grid; gap: 4px; margin-top: 8px; }
  .month-bar .row { background: transparent; padding: 4px 0; }
  .month-bar .month { color: var(--tg-hint); min-width: 80px; font-family: 'Space Mono', monospace; font-size: 12px; }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <h1>💰 הוצאות שלי</h1>
    <div class="user" id="user-greeting">—</div>
  </header>

  <nav class="nav">
    <a href="dashboard.html">סקירה</a>
    <a href="wallet.html">ארנק</a>
    <a href="expenses.html" class="active">הוצאות</a>
    <a href="device.html">מכשיר</a>
    <a href="swarm.html">Swarm</a>
  </nav>

  <section class="card">
    <h2>סיכום</h2>
    <div class="stats-row" id="stats">
      <div class="stat-tile"><div class="n">—</div><div class="l">החודש (₪)</div></div>
      <div class="stat-tile burn"><div class="n">—</div><div class="l">ממוצע 3 חודשים (Burn Rate)</div></div>
    </div>
    <div id="months" class="month-bar"></div>
  </section>

  <section class="card">
    <h2>פילוח לפי קטגוריה (החודש)</h2>
    <div id="categories"><div class="placeholder">טוען…</div></div>
  </section>

  <section class="card">
    <h2>הוצאות קבועות</h2>
    <div id="recurring"><div class="placeholder">—</div></div>
  </section>

  <section class="card">
    <h2>➕ הוסף הוצאה</h2>
    <form class="add-form" id="add-form" onsubmit="return false">
      <div class="row2">
        <input type="number" step="0.01" min="0.01" id="amount" placeholder="סכום ב-₪" required />
        <select id="category" required></select>
      </div>
      <input type="text" id="description" placeholder="תיאור (אופציונלי)" />
      <div class="row2">
        <input type="date" id="date" />
        <select id="recurring">
          <option value="none">חד-פעמי</option>
          <option value="monthly">חודשי קבוע</option>
          <option value="weekly">שבועי</option>
          <option value="yearly">שנתי</option>
        </select>
      </div>
      <button class="btn" id="add-btn" onclick="addExpense()">שמור הוצאה</button>
    </form>
    <div class="result-line" id="add-result"></div>
  </section>

  <section class="card">
    <h2>אחרונים</h2>
    <div id="recent"><div class="placeholder">טוען…</div></div>
  </section>

  <details style="margin-top:16px; padding:12px 16px; background:var(--tg-card); border-radius:10px; cursor:pointer">
    <summary style="color:var(--tg-hint); font-size:13px">🌱 לטעון מצב התחלתי (שכ״ד 6900 + ארנונה 2300 + דלק 600 + מוסכים 5000)</summary>
    <button class="btn secondary" onclick="seedInitial()" style="margin-top:10px">בצע seed חד-פעמי</button>
    <div class="result-line" id="seed-result"></div>
  </details>
</div>

<script src="miniapp.js"></script>
<script>
(async function () {
  const slh = window.SLH_init({ title: "Expenses" });
  const USER_ID = (slh.user && slh.user.id) || 224223270;  // default to Osif

  async function api(path, opts) {
    // Until we have user-auth, we use admin key from URL ?k= or sessionStorage
    const k = new URLSearchParams(location.search).get('k')
            || sessionStorage.getItem('slh_admin_key')
            || prompt('Admin key (saved for session)');
    if (k && !sessionStorage.getItem('slh_admin_key')) sessionStorage.setItem('slh_admin_key', k);
    opts = opts || {};
    opts.headers = Object.assign({ 'X-Admin-Key': k, 'Content-Type': 'application/json' }, opts.headers || {});
    const base = 'https://slh-api-production.up.railway.app';
    const r = await fetch(base + path, opts);
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      throw new Error(j.detail || ('HTTP ' + r.status));
    }
    return r.json();
  }

  async function loadCategories() {
    const sel = document.getElementById('category');
    try {
      const r = await fetch('https://slh-api-production.up.railway.app/api/expenses/categories');
      const j = await r.json();
      sel.innerHTML = (j.categories || []).map(c =>
        `<option value="${c.key}">${c.label}</option>`
      ).join('');
    } catch (e) {
      sel.innerHTML = '<option value="other">אחר</option>';
    }
  }

  async function loadAll() {
    try {
      const [summary, list] = await Promise.all([
        api(`/api/expenses/${USER_ID}/summary?months=6`),
        api(`/api/expenses/${USER_ID}?days=60&limit=20`),
      ]);
      renderSummary(summary);
      renderList(list.expenses || []);
    } catch (e) {
      document.getElementById('recent').innerHTML = `<div class="err">${e.message}</div>`;
    }
  }

  function renderSummary(s) {
    const monthly = s.monthly || [];
    const thisMonth = monthly.length ? monthly[monthly.length - 1].total : 0;
    const burn = s.burn_rate_monthly_avg || 0;
    document.getElementById('stats').innerHTML = `
      <div class="stat-tile"><div class="n">${slh.fmt(thisMonth, 0)}</div><div class="l">החודש (₪)</div></div>
      <div class="stat-tile burn"><div class="n">${slh.fmt(burn, 0)}</div><div class="l">ממוצע 3 חודשים</div></div>
    `;

    // Monthly bars
    const max = Math.max(...monthly.map(m => m.total), 1);
    document.getElementById('months').innerHTML = monthly.length === 0
      ? '<div class="placeholder">אין נתונים</div>'
      : monthly.map(m => `
          <div class="row">
            <span class="month">${m.month}</span>
            <div class="bar" style="flex:1; height:8px; background:var(--tg-bg); border-radius:4px; margin:0 8px;">
              <div style="height:100%; background:linear-gradient(90deg, var(--tg-accent), var(--slh-success)); width:${(m.total/max*100).toFixed(0)}%"></div>
            </div>
            <span class="amount">${slh.fmt(m.total, 0)} ₪</span>
          </div>
      `).join('');

    // Category breakdown
    const cats = s.by_category || [];
    const totalCat = cats.reduce((sum, c) => sum + c.total, 0) || 1;
    document.getElementById('categories').innerHTML = cats.length === 0
      ? '<div class="placeholder">אין הוצאות החודש עדיין.</div>'
      : '<div class="cat-bar">' + cats.map(c => `
          <div class="item">
            <span class="label">${c.label}</span>
            <div class="bar"><div style="width:${(c.total/totalCat*100).toFixed(0)}%"></div></div>
            <span class="amt">${slh.fmt(c.total, 0)} ₪</span>
          </div>
      `).join('') + '</div>';

    // Recurring summary
    const rec = s.recurring || [];
    document.getElementById('recurring').innerHTML = rec.length === 0
      ? '<div class="placeholder">אין הוצאות קבועות מסומנות. סמן "חודשי קבוע" כשתוסיף.</div>'
      : rec.map(r => `
          <div class="row">
            <div class="info">
              <div class="desc">${r.label}</div>
              <div class="meta">${r.recurring === 'monthly' ? 'חודשי' : r.recurring === 'yearly' ? 'שנתי' : 'שבועי'} · ממוצע ${slh.fmt(r.avg_amount, 0)} ₪</div>
            </div>
          </div>
      `).join('');
  }

  function renderList(items) {
    const el = document.getElementById('recent');
    if (items.length === 0) {
      el.innerHTML = '<div class="placeholder">עדיין אין הוצאות. הוסף ראשונה מעל ↑</div>';
      return;
    }
    el.innerHTML = items.slice(0, 15).map(e => {
      const recBadge = e.recurring && e.recurring !== 'none' ? `<span class="recurring">${e.recurring}</span>` : '';
      const date = e.date ? new Date(e.date).toLocaleDateString('he-IL') : '';
      return `
        <div class="row">
          <div class="info">
            <div class="desc">${e.description || '(ללא תיאור)'}</div>
            <div class="meta">${e.category} · ${date}${recBadge ? ' · ' + recBadge : ''}</div>
          </div>
          <span class="amount">${slh.fmt(e.amount_ils, 0)} ₪</span>
          <button onclick="deleteExp(${e.id})" style="background:rgba(255,0,85,.15); color:var(--tg-destructive); border:none; border-radius:4px; padding:4px 8px; font-size:11px; cursor:pointer">×</button>
        </div>
      `;
    }).join('');
  }

  window.addExpense = async function () {
    const amount = parseFloat(document.getElementById('amount').value);
    const category = document.getElementById('category').value;
    const description = document.getElementById('description').value.trim() || null;
    const date = document.getElementById('date').value || null;
    const recurring = document.getElementById('recurring').value;
    const result = document.getElementById('add-result');
    if (!amount || !category) {
      result.textContent = 'סכום וקטגוריה חובה.'; result.className = 'result-line err';
      return;
    }
    try {
      await api('/api/expenses', {
        method: 'POST',
        body: JSON.stringify({ user_id: USER_ID, amount_ils: amount, category, description, date, recurring }),
      });
      result.textContent = '✓ נשמר.'; result.className = 'result-line ok';
      document.getElementById('amount').value = '';
      document.getElementById('description').value = '';
      await loadAll();
    } catch (e) {
      result.textContent = 'שגיאה: ' + e.message; result.className = 'result-line err';
    }
  };

  window.deleteExp = async function (id) {
    if (!confirm('למחוק?')) return;
    try {
      await api('/api/expenses/item/' + id, { method: 'DELETE' });
      await loadAll();
    } catch (e) {
      alert('שגיאה: ' + e.message);
    }
  };

  window.seedInitial = async function () {
    const result = document.getElementById('seed-result');
    try {
      const r = await api(`/api/expenses/${USER_ID}/seed`, { method: 'POST', body: JSON.stringify({}) });
      if (r.skipped) {
        result.textContent = 'דולג — כבר seed-ת החודש.'; result.className = 'result-line ok';
      } else {
        result.textContent = `✓ נטענו ${r.inserted} הוצאות.`; result.className = 'result-line ok';
        await loadAll();
      }
    } catch (e) {
      result.textContent = 'שגיאה: ' + e.message; result.className = 'result-line err';
    }
  };

  await loadCategories();
  await loadAll();
})();
</script>
</body>
</html>
