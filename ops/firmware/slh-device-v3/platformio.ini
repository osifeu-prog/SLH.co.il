; SLH Device Firmware v3 — Railway-integrated kosher wallet
; Changes from clean variant:
;   - Sends heartbeats to https://slh-api-production.up.railway.app/api/esp/heartbeat
;   - Holds signing_token in NVS Preferences (survives reboot)
;   - Fetches /api/wallet/{user_id}/balances every 60s, displays top 3 on TFT
;   - Polls /api/esp/commands/{device_id} for admin commands (REBOOT, etc.)
;   - Falls back to local esp_bridge on 10.0.0.7:5002 if Railway unreachable
;   - First boot: shows pairing QR with URL https://slh-nft.com/device-pair.html?mac=<MAC>

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 115200
upload_protocol = esptool
upload_resetmethod = default

board_flash_mode = dio
board_flash_freq = 40m
board_upload.flash_size = 4MB
board_build.partitions = huge_app.csv
board_upload.maximum_size = 3145728

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7
    ricmoo/QRCode@^0.0.1

build_flags =
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DTOUCH_CS=33
    -DSLH_API_HOST=\"slh-api-production.up.railway.app\"
    -DSLH_LOCAL_BRIDGE=\"http://10.0.0.7:5002\"
    -DSLH_PAIR_URL=\"https://slh-nft.com/device-pair.html\"
    -DSLH_FW_TAG=\"slh-v3\"
