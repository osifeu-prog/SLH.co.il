<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLH Neural Network</title>
    <meta property="og:title" content="SLH Neural Network - Live Intelligence">
    <meta property="og:description" content="Real-time neural mesh tracking ROI, signals, and community activity.">
    <meta property="og:image" content="https://www.slh.co.il/og-image.png">
    <meta property="og:url" content="https://t.me/SLH_macro_bot">
    <style>
        body { margin: 0; overflow: hidden; background: black; color: white; font-family: monospace; }
        #info { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; }
        #status { position: absolute; bottom: 20px; left: 20px; z-index: 100; font-size: 12px; }
    </style>
</head>
<body>
    <div id="info">
        <h1>🧠 SLH Neural Mesh</h1>
        <p>Live activity | <span id="neuronCount">0</span> active neurons</p>
    </div>
    <div id="status">
        ⚡ Bot: <span id="botStatus">Connecting...</span>
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        
        // Setup scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.0008);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        // Create neural network visualization
        const neurons = [];
        const connections = [];
        const neuronCount = 50;
        const geometry = new THREE.SphereGeometry(0.3, 32, 32);
        
        // Create random neurons
        for (let i = 0; i < neuronCount; i++) {
            const material = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(0.5 + Math.random() * 0.3, 1, 0.5),
                emissive: 0x113355,
                emissiveIntensity: 0.5
            });
            const neuron = new THREE.Mesh(geometry, material);
            neuron.position.x = (Math.random() - 0.5) * 40;
            neuron.position.y = (Math.random() - 0.5) * 30;
            neuron.position.z = (Math.random() - 0.5) * 20;
            neuron.userData = {
                speed: 0.002 + Math.random() * 0.003,
                phase: Math.random() * Math.PI * 2,
                connections: []
            };
            scene.add(neuron);
            neurons.push(neuron);
        }
        
        // Add lights
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(10, 20, 10);
        scene.add(pointLight);
        
        // Animation
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            // Gentle floating animation
            neurons.forEach((neuron, i) => {
                neuron.position.y += Math.sin(time * neuron.userData.speed + neuron.userData.phase) * 0.003;
                neuron.position.x += Math.cos(time * neuron.userData.speed * 0.7 + neuron.userData.phase) * 0.002;
                
                // Pulse size
                const scale = 1 + Math.sin(time * 3 + i) * 0.2;
                neuron.scale.set(scale, scale, scale);
            });
            
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY - camera.position.y) * 0.05;
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
        }
        
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = (event.clientY / window.innerHeight) * 2 - 1;
        });
        
        animate();
        
        // Static status — never expose bot token from a public static page.
        // If live status is needed, add a backend endpoint (e.g. /api/status on monitor.slh.co.il)
        // that proxies the Telegram getMe call server-side.
        function updateStatus() {
            const el = document.getElementById('botStatus');
            if (el) el.textContent = '🟢 SLH Macro';
            const n = document.getElementById('neuronCount');
            if (n) n.textContent = neurons.length;
        }
        updateStatus();
        
        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
