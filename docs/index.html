<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLH.co.il - השקעה חכמה בקריפטו</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .container { text-align: center; max-width: 600px; }
        h1 { font-size: 3rem; background: linear-gradient(135deg, #6366f1, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status { background: rgba(16,185,129,0.2); border: 1px solid #10b981; border-radius: 50px; padding: 8px 24px; display: inline-block; margin-bottom: 2rem; }
        .btn { display: inline-block; padding: 12px 24px; border-radius: 12px; text-decoration: none; margin: 0.5rem; transition: transform 0.2s; }
        .btn-primary { background: #6366f1; color: white; }
        .btn-outline { border: 1px solid #6366f1; color: #6366f1; }
        .btn:hover { transform: translateY(-2px); }
        .features { margin-top: 3rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; }
        .feature { background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status">🟢 מערכת פעילה | השקעה חכמה</div>
        <h1>SLH.co.il</h1>
        <p>אותות מסחר, Staking, וארנק קריפטו מתקדם</p>
        <div>
            <a href="https://t.me/SLH_macro_bot" class="btn btn-primary">📱 בוט טלגרם</a>
            <a href="https://github.com/osifeu-prog/SLH.co.il" class="btn btn-outline">🐙 GitHub</a>
        </div>
        <div class="features">
            <div class="feature">📊 Trade Signals</div>
            <div class="feature">💎 Staking APY</div>
            <div class="feature">🔐 ארנק כשר</div>
            <div class="feature">📈 ROI Tracking</div>
        </div>
        <p style="margin-top: 3rem; font-size: 0.875rem;">© SLH Ecosystem | ישראל</p>
    </div>
</body>
</html>
