version: '3.8'

services:
  bot:
    build: .
    command: python bot.py
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    depends_on:
      - redis
      - postgres
    restart: always

  monitor:
    build: .
    command: python monitor/api.py
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - postgres
    restart: always

  signal_scheduler:
    build: .
    command: python -c "
import asyncio
import schedule
import time
from signals.alert_bot import run_signal_engine

async def job():
    await run_signal_engine()

def run_async_job():
    asyncio.run(job())

# Run every hour
schedule.every(1).hours.do(run_async_job)

while True:
    schedule.run_pending()
    time.sleep(60)
"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    depends_on:
      - redis
      - postgres
    restart: always

  redis:
    image: redis:alpine
    restart: always

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=railway
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
