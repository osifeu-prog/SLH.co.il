      BOT_DISPLAY_NAME: "SLH Campaign"
      BOT_DESCRIPTION: "\u05e7\u05de\u05e4\u05d9\u05d9\u05e0\u05d9\u05dd \u05e9\u05d9\u05d5\u05d5\u05e7\u05d9\u05d9\u05dd \u05d5\u05d4\u05e4\u05e6\u05ea \u05e7\u05d4\u05d9\u05dc\u05d4"
