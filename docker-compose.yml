# LEGACY_DISABLED 2026-04-14       DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-slh_secure_2026}@postgres:5432/slh_main
# LEGACY_DISABLED 2026-04-14       ADMIN_USER_ID: ${ADMIN_USER_ID:-224223270}
# LEGACY_DISABLED 2026-04-14 
