      PRICE_ILS: "19"
      PRICE_TON: "1.0"
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-slh_secure_2026}@postgres:5432/slh_main
      ADMIN_USER_ID: ${ADMIN_USER_ID:-224223270}

  nfty-bot:
    container_name: slh-nfty
    build:
      context: .
      dockerfile: ./dockerfiles/Dockerfile.nfty
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BOT_TOKEN: ${NFTY_MADNESS_TOKEN}
      DATABASE_URL: postgresql://postgres:slh_secure_2026@postgres:5432/slh_main
