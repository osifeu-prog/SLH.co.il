      REDIS_URL: redis://redis:6379/2
      LETSEXCHANGE_REF: ${LETSEXCHANGE_REF:-SLH_SWAP}
      TON_API_KEY: ${TON_API_KEY}
      BSC_RPC_URL: ${BSC_RPC_URL:-https://bsc-dataseed.binance.org/}
